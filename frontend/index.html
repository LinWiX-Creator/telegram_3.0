<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Telegram 3.0</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:#fff; display:flex; height:100vh; }
    #sidebar { width:250px; background:#020617; padding:10px; border-right:1px solid #1e293b; }
    #chat { flex:1; display:flex; flex-direction:column; }
    #messages { flex:1; overflow:auto; padding:10px; }
    #input { display:flex; }
    input { flex:1; padding:10px; border:none; }
    button { padding:10px; border:none; background:#2563eb; color:#fff; }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>LinWiX Chat</h3>
  <input id="name" placeholder="Имя..." />
  <button onclick="join()">Войти</button>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="input">
    <input id="msg" placeholder="Сообщение..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
const socket = io("http://localhost:3000");
let username = "";

function join() {
  username = document.getElementById("name").value;
  socket.emit("join", username);
}

socket.on("receive_message", (data) => {
  const div = document.getElementById("messages");
  div.innerHTML += `<p><b>${data.user}:</b> ${data.message}</p>`;
});

function send() {
  const msg = document.getElementById("msg").value;
  socket.emit("send_message", msg);
}
</script>

</body>
</html>
